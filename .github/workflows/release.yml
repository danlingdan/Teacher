name: Build and publish Windows release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows-release:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify tag matches Maven version
        shell: pwsh
        run: |
          [xml]$pom = Get-Content -LiteralPath pom.xml -Raw
          $version = [string]$pom.project.version
          $expectedTag = "v$version"
          if ($env:GITHUB_REF_NAME -ne $expectedTag) {
              throw "Release tag '$env:GITHUB_REF_NAME' does not match pom.xml version '$version'."
          }
          "PROJECT_VERSION=$version" >> $env:GITHUB_ENV

      - name: Run full test suite
        run: mvn -B test

      - name: Build Windows installer and portable archive
        shell: pwsh
        run: .\packaging\package-stage1.ps1

      - name: Verify release artifacts and cloud endpoint
        shell: pwsh
        run: |
          $installer = "target/installer/SQLTeacher-$env:PROJECT_VERSION.exe"
          $archive = "target/installer/SQLTeacher-$env:PROJECT_VERSION-windows-x64.zip"
          $checksums = "target/installer/SHA256SUMS.txt"
          $config = "target/installer/SQLTeacher/app/SQLTeacher.cfg"
          foreach ($file in @($installer, $archive, $checksums, $config)) {
              if (-not (Test-Path -LiteralPath $file)) { throw "Missing release artifact: $file" }
          }
          if (-not (Select-String -LiteralPath $config -SimpleMatch '-Dsqlteacher.cloud.base-url=https://api.sqlteacher.tech' -Quiet)) {
              throw 'Packaged launcher does not contain the production cloud API URL.'
          }

      - name: Preserve workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SQLTeacher-${{ env.PROJECT_VERSION }}-windows
          path: |
            target/installer/SQLTeacher-${{ env.PROJECT_VERSION }}.exe
            target/installer/SQLTeacher-${{ env.PROJECT_VERSION }}-windows-x64.zip
            target/installer/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30

      - name: Create release draft when needed
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view $env:GITHUB_REF_NAME *> $null
          if ($LASTEXITCODE -ne 0) {
              gh release create $env:GITHUB_REF_NAME --verify-tag --draft `
                  --title "SQLTeacher $env:GITHUB_REF_NAME" --generate-notes
              if ($LASTEXITCODE -ne 0) { throw 'Unable to create the GitHub Release draft.' }
          }

      - name: Upload release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload $env:GITHUB_REF_NAME `
              "target/installer/SQLTeacher-$env:PROJECT_VERSION.exe" `
              "target/installer/SQLTeacher-$env:PROJECT_VERSION-windows-x64.zip" `
              "target/installer/SHA256SUMS.txt" --clobber
          if ($LASTEXITCODE -ne 0) { throw 'Unable to upload GitHub Release assets.' }

      - name: Publish complete release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit $env:GITHUB_REF_NAME --draft=false --latest
          if ($LASTEXITCODE -ne 0) { throw 'Unable to publish the GitHub Release.' }
